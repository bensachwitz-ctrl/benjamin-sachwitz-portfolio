<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="50%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f093fb" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,40 440,145 440,367 256,472 72,367 72,145"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="32"/>
  
  <!-- Outer glow ring -->
  <polygon points="256,60 420,155 420,357 256,452 92,357 92,155" 
           fill="none" stroke="url(#glowGrad)" stroke-width="1.5" filter="url(#outerGlow)" opacity="0.6"/>
  
  <!-- Hex border -->
  <polygon points="256,60 420,155 420,357 256,452 92,357 92,155" 
           fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.4"/>
  
  <!-- Inner subtle hex -->
  <polygon points="256,90 395,172 395,340 256,422 117,340 117,172" 
           fill="none" stroke="url(#logoGrad)" stroke-width="0.5" opacity="0.15"/>
  
  <!-- BS Monogram - custom geometric letterforms -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <!-- B letterform - left side -->
    <g transform="translate(-65, 0)">
      <!-- B vertical stem -->
      <rect x="-30" y="-70" width="12" height="140" rx="2" fill="url(#logoGrad)"/>
      <!-- B upper bowl -->
      <path d="M-18,-70 L20,-70 Q50,-70 50,-42 Q50,-18 20,-18 L-18,-18" 
            fill="none" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- B lower bowl (slightly wider) -->
      <path d="M-18,-10 L28,-10 Q60,-10 60,25 Q60,60 28,60 L-18,60 L-18,70" 
            fill="none" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- S letterform - right side, slightly overlapping -->
    <g transform="translate(55, 0)">
      <!-- S curve -->
      <path d="M38,-65 Q38,-70 25,-70 L-5,-70 Q-35,-70 -35,-45 Q-35,-20 -5,-18 L25,-15 Q55,-12 55,18 Q55,55 25,60 L-10,60 Q-35,60 -35,55" 
            fill="none" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Connecting accent line between B and S -->
    <line x1="-10" y1="0" x2="10" y2="0" stroke="url(#logoGrad)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Corner accent dots -->
  <circle cx="256" cy="40" r="3" fill="#4facfe" opacity="0.8"/>
  <circle cx="440" cy="145" r="3" fill="#00f2fe" opacity="0.6"/>
  <circle cx="440" cy="367" r="3" fill="#f093fb" opacity="0.6"/>
  <circle cx="256" cy="472" r="3" fill="#f093fb" opacity="0.8"/>
  <circle cx="72" cy="367" r="3" fill="#00f2fe" opacity="0.6"/>
  <circle cx="72" cy="145" r="3" fill="#4facfe" opacity="0.6"/>
</svg>