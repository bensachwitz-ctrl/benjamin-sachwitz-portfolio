<svg viewBox="0 0 280 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for the mark -->
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>

    <!-- Radial gradient for inner glow -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0" />
    </radialGradient>

    <!-- Text gradient for "BEN" -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- MARK (Left side, ~48x48) -->
  <g transform="translate(4, 4)">
    <!-- Outer shield circle -->
    <circle cx="24" cy="24" r="23" fill="none" stroke="url(#markGradient)" stroke-width="1.2" opacity="0.4"/>

    <!-- Inner glow -->
    <circle cx="24" cy="24" r="20" fill="url(#glowGradient)"/>

    <!-- Diamond/compass shape (main body) -->
    <path d="M 24 6 L 38 24 L 24 42 L 10 24 Z"
          fill="none"
          stroke="url(#markGradient)"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Center compass point -->
    <circle cx="24" cy="24" r="3" fill="url(#markGradient)" opacity="0.8"/>

    <!-- Journey path 1: North arrow (Augusta up) -->
    <line x1="24" y1="12" x2="24" y2="20"
          stroke="url(#markGradient)"
          stroke-width="1.5"
          stroke-linecap="round"
          opacity="0.7"/>
    <polygon points="24,10 22,14 26,14"
             fill="url(#markGradient)"
             opacity="0.6"/>

    <!-- Journey path 2: East arrow (to London/DC) -->
    <line x1="32" y1="24" x2="39" y2="24"
          stroke="url(#markGradient)"
          stroke-width="1.5"
          stroke-linecap="round"
          opacity="0.7"/>
    <polygon points="41,24 37,22 37,26"
             fill="url(#markGradient)"
             opacity="0.6"/>

    <!-- Journey path 3: South-West return arc (back to SC) -->
    <path d="M 16 32 Q 12 28 10 24"
          fill="none"
          stroke="url(#markGradient)"
          stroke-width="1.5"
          stroke-linecap="round"
          opacity="0.6"/>

    <!-- Inner orbital rings (journey cycles) -->
    <circle cx="24" cy="24" r="12"
            fill="none"
            stroke="url(#markGradient)"
            stroke-width="0.8"
            opacity="0.4"
            stroke-dasharray="2,3"/>

    <!-- Subtle "B" letterform integration (inside mark) -->
    <g opacity="0.15">
      <path d="M 20 18 L 20 30 M 20 18 L 23 18 Q 25 18 25 20 Q 23 21 20 21 M 20 24 L 24 24 Q 26 24 26 26 Q 26 28 24 28 L 20 28"
            fill="none"
            stroke="url(#markGradient)"
            stroke-width="0.8"/>
    </g>
  </g>

  <!-- TEXT: "BEN SACHWITZ" -->
  <g font-family="Outfit, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="-0.01em">
    <!-- "BEN" in bold (weight 800) with gradient -->
    <text x="60" y="35"
          font-size="18"
          font-weight="800"
          fill="url(#textGradient)"
          letter-spacing="-0.01em">BEN</text>

    <!-- "SACHWITZ" in light (weight 300) in light gray -->
    <text x="60" y="48"
          font-size="11"
          font-weight="300"
          fill="#e0e4ec"
          letter-spacing="-0.01em">SACHWITZ</text>
  </g>
</svg>
