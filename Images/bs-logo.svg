<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient: Electric Blue → Cyan → Soft Purple -->
    <linearGradient id="bsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle ring gradient (15% opacity) -->
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.15" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for halo -->
    <filter id="haloGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="24" fill="#050816"/>

  <!-- Subtle background ring (80% of canvas = 410px diameter, 205px radius) -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="url(#ringGradient)" stroke-width="1.5" opacity="0.6"/>

  <!-- Halo glow layer (subtle outer glow) -->
  <g filter="url(#haloGlow)">
    <!-- B letter with glow -->
    <path d="M 140 180 L 140 370 L 200 370 Q 230 370 230 355 L 230 310 Q 230 295 200 295 L 160 295 L 160 240 L 200 240 Q 230 240 230 225 L 230 195 Q 230 180 200 180 L 140 180 Z"
          fill="url(#bsGradient)"
          fill-rule="evenodd"
          stroke="url(#bsGradient)"
          stroke-width="0.5"
          opacity="0.3"/>

    <!-- S letter with glow -->
    <path d="M 280 180 Q 320 180 335 190 Q 350 200 350 215 Q 350 230 335 235 L 300 250 Q 290 255 290 265 L 290 285 Q 290 300 310 310 L 345 330 Q 360 340 360 350 Q 360 365 340 375 Q 320 385 280 385 Q 250 385 230 375 L 250 360 Q 270 370 280 370 Q 310 370 320 365 Q 335 360 335 350 Q 335 340 320 335 L 280 315 Q 265 310 265 295 L 265 275 Q 265 260 285 250 L 320 235 Q 340 230 340 215 Q 340 200 320 195 Q 305 190 280 190 Z"
          fill="url(#bsGradient)"
          fill-rule="evenodd"
          stroke="url(#bsGradient)"
          stroke-width="0.5"
          opacity="0.3"/>
  </g>

  <!-- Main B letter (left) - Bold, geometric -->
  <path d="M 140 180 L 140 370 L 200 370 Q 230 370 230 355 L 230 310 Q 230 295 200 295 L 160 295 L 160 240 L 200 240 Q 230 240 230 225 L 230 195 Q 230 180 200 180 L 140 180 Z"
        fill="url(#bsGradient)"
        filter="url(#glow)"
        opacity="0.95"/>

  <!-- Main S letter (right) - Bold, geometric, slightly overlapping -->
  <path d="M 280 180 Q 320 180 335 190 Q 350 200 350 215 Q 350 230 335 235 L 300 250 Q 290 255 290 265 L 290 285 Q 290 300 310 310 L 345 330 Q 360 340 360 350 Q 360 365 340 375 Q 320 385 280 385 Q 250 385 230 375 L 250 360 Q 270 370 280 370 Q 310 370 320 365 Q 335 360 335 350 Q 335 340 320 335 L 280 315 Q 265 310 265 295 L 265 275 Q 265 260 285 250 L 320 235 Q 340 230 340 215 Q 340 200 320 195 Q 305 190 280 190 Z"
        fill="url(#bsGradient)"
        filter="url(#glow)"
        opacity="0.95"/>

  <!-- Light accent highlight on gradient (subtle inner light) -->
  <ellipse cx="220" cy="200" rx="60" ry="80" fill="#ffffff" opacity="0.08"/>
</svg>
